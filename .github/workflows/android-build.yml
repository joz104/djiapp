name: Android Debug APK

on:
  push:
    branches: [v2-capacitor]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm ci

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Download MediaMTX (arm64) and bundle as jniLib
        run: |
          MEDIAMTX_VERSION=v1.17.1
          mkdir -p /tmp/mediamtx
          curl -sSL \
            "https://github.com/bluenviron/mediamtx/releases/download/${MEDIAMTX_VERSION}/mediamtx_${MEDIAMTX_VERSION}_linux_arm64.tar.gz" \
            -o /tmp/mediamtx/mediamtx.tar.gz
          tar -xzf /tmp/mediamtx/mediamtx.tar.gz -C /tmp/mediamtx
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          cp /tmp/mediamtx/mediamtx android/app/src/main/jniLibs/arm64-v8a/libmediamtx.so
          chmod +x android/app/src/main/jniLibs/arm64-v8a/libmediamtx.so
          ls -lh android/app/src/main/jniLibs/arm64-v8a/libmediamtx.so

      - name: Sync Capacitor to Android
        run: npx cap sync android

      - name: Grant gradlew execute permission
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: field-multicam-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Rename APK with commit info
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             field-multicam-${SHORT_SHA}.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             field-multicam-latest.apk

      # Publish a rolling "latest" release so you can download the APK
      # directly from https://github.com/joz104/djiapp/releases/tag/v2-latest
      # without needing to be logged in or fight with zip artifacts.
      - name: Publish rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2-latest
          name: "v2-capacitor latest debug build"
          body: |
            Auto-updated debug build from the latest push to `v2-capacitor`.
            Commit: `${{ github.sha }}`
            Built: `${{ github.event.head_commit.timestamp }}`

            **How to install on your phone:**
            1. Tap `field-multicam-latest.apk` below to download.
            2. When prompted, allow your browser to install unknown apps (one-time setting).
            3. Open the downloaded file from your Downloads notification or Files app.

            Not signed. Debug key only — do not publish to a store.
          files: |
            field-multicam-latest.apk
            field-multicam-*.apk
          prerelease: true
          draft: false
          make_latest: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
